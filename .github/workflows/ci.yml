name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  validate:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aeo
          POSTGRES_PASSWORD: aeo_dev
          POSTGRES_DB: aeo_suite
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aeo -d aeo_suite"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://aeo:aeo_dev@localhost:5432/aeo_suite
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      PORT: 3000
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      JWT_EXPIRES_IN: "86400"
      REFRESH_TOKEN_EXPIRES_IN: "2592000"
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      ALLOWED_ORIGINS: "http://localhost:3001"
      DAILY_COST_ALERT_THRESHOLD: "10"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run E2E tests
        run: npm run test:e2e
